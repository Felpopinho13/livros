<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Detalhes do Livro</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">BookStore</a>
            <div class="search-box">
                <input type="text" placeholder="Buscar livros...">
                <button>🔍</button>
            </div>
            <nav class="nav-icons">
                <a href="index.html">🏠</a>
                <a href="carrinho.html">🛒 <span id="cart-count">0</span></a>
                <button id="wishlistToggle" class="wishlist-header">
                    ❤ <span id="wishlistCount">0</span>
                </button>
                <a href="area-cliente.html">👤</a>
                <a href="admin/admin-dashboard.html" class="admin-icon">⚙</a>
            </nav>
        </div>
    </header>
    <section class="book-detail">
        <div class="container book-detail-grid">

            <!-- IMAGEM -->
            <div class="book-gallery">
                <img src="assets/img/1984.jpg" alt="1984">
            </div>

            <!-- INFORMAÇÕES -->
            <div class="book-info">
                <div class="book-title-row">
                    <h1>1984</h1>

                    <button class="btn-wishlist" data-id="1" data-titulo="1984" data-preco="79.90"
                        data-imagem="assets/img/1984.jpg">
                        ❤
                    </button>
                </div>
                <p class="author">por George Orwell</p>

                <p class="description">
                    Um clássico da literatura distópica que retrata um regime totalitário...
                </p>
            </div>

            <!-- BOX DE COMPRA -->
            <div class="book-buy-box">
                <p class="price">R$ 79,90</p>
                <p class="stock">Em estoque</p>

                <input type="number" value="1" min="1" class="input">

                <button class="btn btn-primary btn-block">
                    Adicionar ao carrinho
                </button>

                <a href="checkout.html" class="btn btn-block" style="background:#ffa41c">
                    Comprar agora
                </a>
            </div>

        </div>
    </section>

    <section class="reviews-section">
        <div class="container">

            <h2>Estrelas</h2>

            <div class="reviews-summary">
                <div class="average-rating">
                    <span id="averageScore">0.0</span>
                    <div class="stars" id="averageStars"></div>
                    <p><span id="totalReviews">0</span> avaliações</p>
                </div>
            </div>

            <div class="reviews-list" id="reviewsList"></div>

        </div>
    </section>

    <!-- Modal da Lista de Desejos -->
    <div class="modal-overlay" id="wishlistModal">
        <div class="modal wishlist-modal">

            <div class="modal-header">
                <h3>Minha Lista de Desejos</h3>
                <button id="closeWishlist">✕</button>
            </div>

            <div class="wishlist-content"></div>

        </div>
    </div>

    <footer class="footer">
        <p>© 2026 BookStore - Todos os direitos reservados</p>
    </footer>

    <script src="assets/js/cart.js"></script>
    <script src="assets/js/wishlist.js"></script>
</body>

</html>
