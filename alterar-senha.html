<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alterar Senha</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

<section class="auth-page">

    <div class="auth-container">

        <div class="auth-box">
            <h2>Alterar Senha</h2>

            <form class="auth-form">

                <div class="form-group">
                    <label>Senha Atual</label>
                    <input type="password" placeholder="Digite sua senha atual" required>
                </div>

                <div class="form-group">
                    <label>Nova Senha</label>
                    <input type="password" placeholder="Digite a nova senha" required>
                </div>

                <div class="form-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" placeholder="Confirme a nova senha" required>
                </div>

                <button type="submit" class="btn-primary btn-block">
                    Salvar Nova Senha
                </button>

            </form>

            <div class="auth-links">
                <a href="area-cliente.html">Voltar para minha conta</a>
            </div>

        </div>

    </div>

</section>

</body>
</html>
