<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/admin/admin-layout.css">
</head>

<body class="admin-body">

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <h2>Painel Admin</h2>
            </div>

            <nav class="admin-menu">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-clientes.html">Clientes</a>
                <a href="admin-livros.html">Livros</a>
                <a href="admin-estoque.html">Estoque</a>
                <a href="admin-pedidos.html">Pedidos</a>
                <a href="admin-trocas.html">Trocas</a>
                <a href="analise-vendas.html">Análise de Vendas</a>
            </nav>

            <div class="admin-back-store">
                <a href="../index.html">← Voltar para Loja</a>
            </div>
        </aside>

        <!-- ÁREA PRINCIPAL -->
        <div class="admin-main">

            <!-- HEADER -->
            <header class="admin-header">
                <h1>Clientes</h1>
                <div class="admin-user">
                    <span>Administrador</span>
                </div>
            </header>

            <!-- CONTEÚDO -->
            <section class="admin-content">
                <div class="admin-container">

                    <div class="admin-page-header">
                        <h2>Clientes</h2>
                        <button class="btn-primary" onclick="abrirModalCliente()">
                            + Novo Cliente
                        </button>
                    </div>

                    <div class="admin-filters">
                        <input type="text" placeholder="Buscar cliente..." class="admin-input">
                        <select class="admin-select">
                            <option>Todos</option>
                            <option>Ativos</option>
                            <option>Inativos</option>
                        </select>
                    </div>

                    <div class="admin-table-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                    <th>Cadastro</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>Maria Silva</td>
                                    <td>maria@email.com</td>
                                    <td><span class="status success">Ativo</span></td>
                                    <td>12/01/2026</td>
                                    <td class="admin-actions">
                                        <button class="btn-link"
                                            onclick="abrirModalVer('Maria Silva', 'maria@email.com', 'Ativo', '12/01/2026')">
                                            Ver
                                        </button>
                                        <button class="btn-link"
                                            onclick="abrirModalEditar('Maria Silva', 'maria@email.com', 'Ativo')">
                                            Editar
                                        </button> <button class="btn-danger">Desativar</button>
                                    </td>
                                </tr>
                            </tbody>
                            <div class="admin-pagination">
                                <button class="page-btn">Anterior</button>
                                <button class="page-number active">1</button>
                                <button class="page-number">2</button>
                                <button class="page-number">3</button>
                                <button class="page-btn">Próximo</button>
                            </div>
                        </table>
                    </div>

                </div>
            </section>
        </div>
    </div>

    <!-- MODAL CLIENTE -->
    <div class="admin-modal-overlay" id="clienteModal" style="display:none;">
        <div class="admin-modal">

            <div class="admin-modal-header">
                <h3>Novo Cliente</h3>
                <button class="modal-close" onclick="fecharModalCliente()">✕</button>
            </div>

            <div class="admin-modal-body">

                <div class="admin-form-group">
                    <label>Nome</label>
                    <input type="text" class="admin-input">
                </div>

                <div class="admin-form-group">
                    <label>Email</label>
                    <input type="email" class="admin-input">
                </div>

                <div class="admin-form-group">
                    <label>Status</label>
                    <select class="admin-select">
                        <option>Ativo</option>
                        <option>Inativo</option>
                    </select>
                </div>

            </div>

            <div class="admin-modal-footer">
                <button class="btn-secondary btn-sm" onclick="fecharModalCliente()">
                    Cancelar
                </button>
                <button class="btn-primary btn-sm" onclick="fecharModal()">Salvar</button>
            </div>

        </div>
    </div>

    <!-- MODAL VER CLIENTE -->
    <div class="admin-modal-overlay" id="verClienteModal" style="display:none;">
        <div class="admin-modal">

            <div class="admin-modal-header">
                <h3>Detalhes do Cliente</h3>
                <button class="modal-close" onclick="fecharModalVer()">✕</button>
            </div>

            <div class="admin-modal-body">

                <div class="admin-form-group">
                    <label>Nome</label>
                    <input type="text" class="admin-input" id="verNome" disabled>
                </div>

                <div class="admin-form-group">
                    <label>Email</label>
                    <input type="text" class="admin-input" id="verEmail" disabled>
                </div>

                <div class="admin-form-group">
                    <label>Status</label>
                    <input type="text" class="admin-input" id="verStatus" disabled>
                </div>

                <div class="admin-form-group">
                    <label>Data Cadastro</label>
                    <input type="text" class="admin-input" id="verData" disabled>
                </div>

            </div>

            <div class="admin-modal-footer">
                <button class="btn-secondary btn-sm" onclick="fecharModalVer()">Fechar</button>
            </div>

        </div>
    </div>

    <!-- MODAL EDITAR CLIENTE -->
    <div class="admin-modal-overlay" id="editarClienteModal" style="display:none;">
        <div class="admin-modal">

            <div class="admin-modal-header">
                <h3>Editar Cliente</h3>
                <button class="modal-close" onclick="fecharModalEditar()">✕</button>
            </div>

            <div class="admin-modal-body">

                <div class="admin-form-group">
                    <label>Nome</label>
                    <input type="text" class="admin-input" id="editarNome">
                </div>

                <div class="admin-form-group">
                    <label>Email</label>
                    <input type="email" class="admin-input" id="editarEmail">
                </div>

                <div class="admin-form-group">
                    <label>Status</label>
                    <select class="admin-select" id="editarStatus">
                        <option>Ativo</option>
                        <option>Inativo</option>
                    </select>
                </div>

            </div>

            <div class="admin-modal-footer">
                <button class="btn-secondary btn-sm" onclick="fecharModalEditar()">Cancelar</button>
                <button class="btn-primary btn-sm">Salvar</button>
            </div>

        </div>
    </div>
    <script src="../assets/js/admin.js"></script>
</body>

</html>
