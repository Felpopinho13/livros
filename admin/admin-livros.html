<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/admin/admin-layout.css">
</head>

<body class="admin-body">

    <div class="admin-layout">

        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <h2>Painel Admin</h2>
            </div>

            <nav class="admin-menu">
                <a href="admin-dashboard.html">Dashboard</a>
                <a href="admin-clientes.html">Clientes</a>
                <a href="admin-livros.html">Livros</a>
                <a href="admin-estoque.html">Estoque</a>
                <a href="admin-pedidos.html">Pedidos</a>
                <a href="admin-trocas.html">Trocas</a>
                <a href="analise-vendas.html">Análise de Vendas</a>
            </nav>

            <div class="admin-back-store">
                <a href="../index.html">← Voltar para Loja</a>
            </div>
        </aside>

        <!-- ÁREA PRINCIPAL -->
        <div class="admin-main">

            <!-- HEADER -->
            <header class="admin-header">
                <h1>Livros</h1>
                <div class="admin-user">
                    <span>Administrador</span>
                </div>
            </header>

            <!-- CONTEÚDO -->
            <section class="admin-content">
                <div class="admin-page-header">
                    <h2>Livros</h2>
                    <button class="btn-primary" onclick="abrirModalNovoLivro()">
                        + Novo Livro
                    </button>
                </div>

                <div class="admin-filters">
                    <input type="text" placeholder="Buscar livro..." class="admin-input">
                    <select class="admin-select">
                        <option>Todas Categorias</option>
                        <option>Ficção</option>
                        <option>Tecnologia</option>
                        <option>Negócios</option>
                    </select>
                </div>

                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Livro</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>10</td>
                                <td>Clean Code</td>
                                <td>Tecnologia</td>
                                <td>R$ 129,90</td>
                                <td>32</td>
                                <td><span class="status success">Ativo</span></td>
                                <td class="admin-actions">
                                    <button class="btn-link"
                                        onclick="abrirModalEditarLivro('Clean Code','Tecnologia',129.90,32)">
                                        Editar
                                    </button> <button class="btn-danger">Excluir</button>
                                </td>
                            </tr>
                            <tr>
                                <td>11</td>
                                <td>Mindset</td>
                                <td>Negócios</td>
                                <td>R$ 79,90</td>
                                <td>0</td>
                                <td><span class="status danger">Sem Estoque</span></td>
                                <td class="admin-actions">
                                    <button class="btn-link"
                                        onclick="abrirModalEditarLivro('Mindset','Negócios',79.90,0)">
                                        Editar
                                    </button> <button class="btn-danger">Excluir</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="admin-pagination">
                        <button class="page-btn">Anterior</button>
                        <button class="page-number active">1</button>
                        <button class="page-number">2</button>
                        <button class="page-btn">Próximo</button>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <!-- MODAL NOVO LIVRO -->
    <div class="admin-modal-overlay" id="novoLivroModal" style="display:none;">
        <div class="admin-modal">

            <div class="admin-modal-header">
                <h3>Novo Livro</h3>
                <button class="modal-close" onclick="fecharModalNovoLivro()">✕</button>
            </div>

            <div class="admin-modal-body">

                <div class="admin-form-group">
                    <label>Título</label>
                    <input type="text" class="admin-input">
                </div>

                <div class="admin-form-group">
                    <label>Categoria</label>
                    <select class="admin-select">
                        <option>Tecnologia</option>
                        <option>Negócios</option>
                        <option>Ficção</option>
                    </select>
                </div>

                <div class="admin-form-group">
                    <label>Preço</label>
                    <input type="number" class="admin-input">
                </div>

                <div class="admin-form-group">
                    <label>Estoque</label>
                    <input type="number" class="admin-input">
                </div>

            </div>

            <div class="admin-modal-footer">
                <button class="btn-secondary btn-sm" onclick="fecharModalNovoLivro()">Cancelar</button>
                <button class="btn-primary btn-sm">Salvar</button>
            </div>

        </div>
    </div>
    <!-- MODAL EDITAR LIVRO -->
    <div class="admin-modal-overlay" id="editarLivroModal" style="display:none;">
        <div class="admin-modal">

            <div class="admin-modal-header">
                <h3>Editar Livro</h3>
                <button class="modal-close" onclick="fecharModalEditarLivro()">✕</button>
            </div>

            <div class="admin-modal-body">

                <div class="admin-form-group">
                    <label>Título</label>
                    <input type="text" class="admin-input" id="editarLivroNome">
                </div>

                <div class="admin-form-group">
                    <label>Categoria</label>
                    <select class="admin-select" id="editarLivroCategoria">
                        <option>Tecnologia</option>
                        <option>Negócios</option>
                        <option>Ficção</option>
                    </select>
                </div>

                <div class="admin-form-group">
                    <label>Preço</label>
                    <input type="number" class="admin-input" id="editarLivroPreco">
                </div>

                <div class="admin-form-group">
                    <label>Estoque</label>
                    <input type="number" class="admin-input" id="editarLivroEstoque">
                </div>

            </div>

            <div class="admin-modal-footer">
                <button class="btn-secondary btn-sm" onclick="fecharModalEditarLivro()">Cancelar</button>
                <button class="btn-primary btn-sm">Salvar</button>
            </div>

        </div>
    </div>
    <script src="../assets/js/admin.js"></script>
</body>
