<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Finalizar Compra</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">BookStore</a>

      <form class="search-box" action="resultados-busca.html" method="GET">
        <input type="text" name="q" placeholder="Buscar livros..." class="input">
        <button type="submit">🔍</button>
      </form>

      <nav class="nav-icons">
        <a href="index.html">🏠</a>
        <a href="carrinho.html">🛒 <span id="cart-count">0</span></a>
        <a href="area-cliente.html">👤</a>
        <a href="admin/admin-dashboard.html" class="admin-icon">⚙</a>
      </nav>
    </div>
  </header>
  <section class="checkout-page">
    <div class="container">

      <h2>Finalizar Compra</h2>

      <div class="checkout-layout">

        <div class="checkout-form">

          <div class="card checkout-card">
            <div class="checkout-address-grid">

              <input placeholder="CEP">
              <input placeholder="Logradouro">

              <input placeholder="Número">
              <input placeholder="Complemento">

              <input placeholder="Bairro">

              <input placeholder="Cidade">
              <input placeholder="Estado">

            </div>
          </div>

          <div class="payment-section card">

            <h3>Forma de Pagamento</h3>

            <div class="payment-options">

              <label>
                <input type="radio" name="payment" value="pix">
                Pix
              </label>

              <label>
                <input type="radio" name="payment" value="boleto">
                Boleto
              </label>

              <label>
                <input type="radio" name="payment" value="cartao">
                Cartão de Crédito
              </label>

            </div>

            <!-- PIX -->
            <div class="payment-form" id="pixForm">
              <input type="text" placeholder="Nome completo">
              <input type="text" placeholder="CPF">
              <input type="text" placeholder="Telefone">
            </div>

            <!-- BOLETO -->
            <div class="payment-form" id="boletoForm">
            </div>

            <!-- CARTÃO -->
            <div class="payment-form" id="cartaoForm">
              <input type="text" placeholder="Número do Cartão">
              <input type="text" placeholder="Nome impresso no cartão">
              <input type="text" placeholder="Código de segurança (CVV)">
              <input type="text" placeholder="Validade (MM/AA)">
              <input type="email" placeholder="Email">
              <input type="date" placeholder="Data de nascimento">
            </div>

          </div>

        </div>

        <div class="checkout-summary card">
          <h3>Resumo do pedido</h3>
          <p>Subtotal: <strong>R$ 59,90</strong></p>
          <p>Frete: <strong>R$ 15,00</strong></p>
          <hr>
          <p class="total-price">Total: R$ 74,90</p>

          <button class="btn btn-primary btn-block" id="finalizarPagamento">
            Finalizar pagamento
          </button>
        </div>

      </div>
    </div>
  </section>
  <div class="modal-overlay" id="paymentModal">
    <div class="modal">
      <h3 id="paymentMessage"></h3>
      <div class="modal-actions">
        <button class="btn-primary" id="closePaymentModal">OK</button>
      </div>
    </div>
  </div>
  <script src="assets/js/checkout.js"></script>
</body>

</html>
