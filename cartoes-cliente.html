<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>BookStore</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<header class="header">
    <div class="container">
        <a href="index.html" class="logo">BookStore</a>

        <form class="search-box" action="resultados-busca.html" method="GET">
            <input type="text" name="q" placeholder="Buscar livros..." class="input">
            <button type="submit">🔍</button>
        </form>

        <nav class="nav-icons">
            <a href="index.html">🏠</a>
            <a href="carrinho.html">🛒 <span id="cart-count">0</span></a>
            <a href="area-cliente.html">👤</a>
            <a href="admin/admin-dashboard.html" class="admin-icon">⚙</a>
        </nav>
    </div>
</header>

<body>
    <section class="wallet-page">
        <div class="wallet-container">
            <!-- Header cartões -->
            <div class="wallet-header">
                <h2>Cartões</h2>
                <button class="btn-primary">
                    + Adicionar Cartão de Crédito
                </button>
            </div>

            <!-- Grid cartões -->
            <div class="wallet-grid">

                <!-- Cartão padrão -->
                <div class="wallet-card primary">
                    <div class="wallet-card-top">
                        <strong>Felipi Pereira</strong>
                        <span class="badge">Padrão</span>
                    </div>

                    <p>**** **** **** 0607</p>
                    <p>Vence em 12/2031</p>

                    <div class="wallet-actions">
                        <a href="#">Remover</a>
                    </div>
                </div>

                <!-- Outro cartão -->
                <div class="wallet-card">
                    <div class="wallet-card-top">
                        <strong>Felipi Pereira</strong>
                    </div>

                    <p>**** **** **** 9403</p>
                    <p>Vence em 11/2028</p>

                    <div class="wallet-actions">
                        <a href="#">Remover</a>
                        <a href="#" class="make-default">Tornar padrão</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- MODAL NOVO CARTÃO -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal">

            <h3>Novo Cartão</h3>

            <form id="cardForm">

                <input type="text" name="nome" placeholder="Nome impresso no cartão" required>
                <input type="text" name="numero" placeholder="Número do cartão" maxlength="19" required>

                <div class="form-row">
                    <input type="text" name="validade" placeholder="Validade (MM/AA)" maxlength="5" required>
                    <input type="text" name="cvv" placeholder="CVV" maxlength="4" required>
                </div>

                <div class="modal-actions">
                    <button type="button" id="closeCardModal" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>

            </form>
        </div>
    </div>
    <script src="assets/js/cartoes.js"></script>
</body>

</html>
